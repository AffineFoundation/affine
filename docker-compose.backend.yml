version: "3.8"

services:
  # API Server - Central API service
  api:
    image: thebes1618/affine:latest
    container_name: affine-api
    restart: unless-stopped
    mem_reservation: "2g"
    mem_limit: "4g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - /var/log/affine/api:/var/log/affine/api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_SERVICES_ENABLED=true
      - API_RATE_LIMIT_ENABLED=false
      - API_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 10s
    command: ["-vv", "api"]

  # Scheduler - Task generation service
  scheduler:
    image: thebes1618/affine:latest
    container_name: affine-scheduler
    restart: unless-stopped
    mem_reservation: "1g"
    mem_limit: "2g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - /var/log/affine/scheduler:/var/log/affine/scheduler
    environment:
      - SCHEDULER_TASK_GENERATION_INTERVAL=60
      - SCHEDULER_CLEANUP_INTERVAL=300
      - SCHEDULER_MAX_TASKS_PER_MINER_ENV=30
    depends_on:
      api:
        condition: service_healthy
    command: ["-vv", "scheduler"]

  # Executor - Task execution service
  executor:
    image: thebes1618/affine:latest
    container_name: affine-executor
    restart: unless-stopped
    mem_reservation: "4g"
    mem_limit: "8g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
      - /var/log/affine/executor:/var/log/affine/executor
    environment:
      - AFFINE_API_URL=http://api:8000/api/v1
      - EXECUTOR_POLL_INTERVAL=5
      - SERVICE_MODE=true
    depends_on:
      api:
        condition: service_healthy
    command: ["-vv", "executor"]

  # Miners Monitor - Miner synchronization service
  miners:
    image: thebes1618/affine:latest
    container_name: affine-miners
    restart: unless-stopped
    mem_reservation: "1g"
    mem_limit: "2g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - /var/log/affine/monitor:/var/log/affine/monitor
    depends_on:
      api:
        condition: service_healthy
    command: ["-vv", "monitor"]

  # Scorer - Weight calculation service
  scorer:
    image: thebes1618/affine:latest
    container_name: affine-scorer
    restart: unless-stopped
    mem_reservation: "1g"
    mem_limit: "2g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - /var/log/affine/scorer:/var/log/affine/scorer
    environment:
      - AFFINE_API_URL=http://api:8000/api/v1
      - SCORER_SAVE_TO_DB=true
      - SERVICE_MODE=true
    depends_on:
      api:
        condition: service_healthy
    command: ["-vv", "scorer"]

networks:
  default:
    name: affine-backend