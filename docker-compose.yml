version: "3.8"

services:
  validator:
    image: affine:local
    container_name: affine-validator
    restart: unless-stopped
    mem_reservation: "6g"
    mem_limit:       "8g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - validator-cache:/app/data/blocks
    ports:
      - "8001:8000"           # host 8001 → container’s AFFINE_METRICS_PORT=8000
    environment:
      - AFFINE_CACHE_DIR=/app/data/blocks
      - AFFINE_METRICS_PORT=8000
      - AFFINE_METRICS_ADDR=0.0.0.0
      - SIGNER_URL=http://signer:8080
    depends_on:
      signer:
        condition: service_healthy
    command: ["-vv", "validate"]

  runner:
    image: affine:local
    container_name: affine-runner
    restart: unless-stopped
    mem_reservation: "6g"
    mem_limit:       "8g"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    environment:
      - AFFINE_METRICS_PORT=8000
      - AFFINE_METRICS_ADDR=0.0.0.0
      - SIGNER_URL=http://signer:8080
      - AFFINE_QS_IMAGE=affine:local
      - AFFINE_QS_KEYS=SAT
      - AFFINE_QS_MAX_ROUNDS=30
      - DOCKER_HOST=unix:///var/run/docker.sock
    depends_on:
      signer:
        condition: service_healthy
    command: ["-vv", "runner"]

  prometheus:
    image: prom/prometheus:latest
    container_name: affine-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/prometheus/prometheus.yml"
      - "--log.level=warn"

  grafana:
    image: grafana/grafana:latest
    container_name: affine-grafana
    restart: unless-stopped
    ports:
      - "8000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_LOG_LEVEL=warn       
      - GF_LOG_MODE=console     
    volumes:
      - grafana-storage:/var/lib/grafana:rw

  signer:
    image: thebes1618/affine:latest
    container_name: affine-signer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SIGNER_HOST=0.0.0.0
      - SIGNER_PORT=8080
    volumes:
      - ./.env:/app/.env:ro
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: ["-v", "signer"]

  # agentenv service is deprecated with Quixand pipeline (envs launched on-demand inside runner)
  # agentenv:
  #   image: thebes1618/affine:latest
  #   container_name: agentenv-servers
  #   restart: unless-stopped
  #   command: ["envs"]
  #   healthcheck:
  #     test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8010/ >/dev/null && curl -fsS http://localhost:8011/ >/dev/null && curl -fsS http://localhost:8012/ >/dev/null && curl -fsS http://localhost:8013/ >/dev/null"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 5s
  #   expose:
  #     - "8010"
  #     - "8011"
  #     - "8012"
  #     - "8013"

  watchtower:
    image: containrrr/watchtower
    container_name: affine-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 affine-validator affine-runner affine-signer

volumes:
  grafana-storage:
  validator-cache:
    name: affine-validator-cache
